<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password €” HomeFixSolution</title>
  <link rel="stylesheet" href="../../css/user/layout/dashboard.css?v=20260323b">
  <link rel="stylesheet" href="../../css/user/pages/security/reset-password.css">
</head>
<body>
  <div class="app-shell">
    <main class="content reset-content">
      <section class="home-card reset-card">
        <h1>RESET PASSWORD</h1>
        <div class="reset-panel">
          <form id="resetPasswordForm" class="reset-form" novalidate>
            <label class="reset-label" for="resetEmail">Email</label>
            <input class="reset-input" id="resetEmail" type="email" autocomplete="email" readonly>

            <label class="reset-label" for="resetNewPassword">New Password</label>
            <div class="field">
              <input class="reset-input" id="resetNewPassword" type="password" autocomplete="new-password" maxlength="12" required>
              <button type="button" class="password-toggle" data-target="#resetNewPassword" aria-label="Show password" aria-pressed="false">
                <img src="../../images/icons/eye-closed.svg" alt="Show password">
              </button>
            </div>

            <label class="reset-label" for="resetConfirmPassword">Confirm New Password</label>
            <div class="field">
              <input class="reset-input" id="resetConfirmPassword" type="password" autocomplete="new-password" maxlength="12" required>
              <button type="button" class="password-toggle" data-target="#resetConfirmPassword" aria-label="Show password" aria-pressed="false">
                <img src="../../images/icons/eye-closed.svg" alt="Show password">
              </button>
            </div>

            <div class="password-rules" aria-live="polite">
              <p class="password-rules-title">Password must include:</p>
              <ul class="password-rules-list">
                <li id="passwordRuleLength">8-12 characters</li>
                <li id="passwordRuleLower">A lowercase letter (a-z)</li>
                <li id="passwordRuleUpper">An uppercase letter (A-Z)</li>
                <li id="passwordRuleDigit">A number (0-9)</li>
                <li id="passwordRuleSpecial">A special character (e.g. !@#$)</li>
              </ul>
            </div>

            <div class="reset-actions">
              <button class="reset-btn" type="submit">Save New Password</button>
              <a class="reset-btn reset-btn-secondary" href="../../login.html">Back</a>
            </div>
          </form>
          <div id="resetMessage" class="reset-message" aria-live="polite"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="../../firebase/config/firebase-config.js"></script>
  <script src="../../databasehfs/users/core.js?v=20260304a"></script>
  <script src="../../databasehfs/users/user-profile-database.js"></script>
  <script src="../../databasehfs/users/booking-database.js"></script>
  <script src="../../databasehfs/users/user-database.js"></script>
  <script src="../../Js/user/security/reset-password.js"></script>
</body>
</html>
