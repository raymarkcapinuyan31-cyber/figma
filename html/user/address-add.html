<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <link rel="stylesheet" href="../../css/user/layout/dashboard.css">
  <link rel="stylesheet" href="../../css/user/pages/address-book/index.css">
  <script src="../../Js/user/side-panel/preload.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Toggle sidebar" aria-expanded="true">˜°</button>
        <div class="logo-wrapper" aria-hidden="true">
          <img class="top-logo" src="../../images/logos/homefixlogo.png" alt="HomeFixSolution logo">
        </div>
        <div class="app-title">HomeFixSolution</div>
      </div>
      <div class="user-menu-wrap">
        <button class="user-menu-btn" id="userMenuBtn" type="button" aria-haspopup="true" aria-expanded="false">
          User <span class="caret">–¼</span>
        </button>
        <div class="user-menu" id="userMenu" role="menu" aria-hidden="true">
          <a href="../../login.html" role="menuitem" data-logout="true">Log out</a>
        </div>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <a class="nav-link" href="dashboard.html">Home</a>
        <a class="nav-link" href="book.html">Book a Service</a>
        <a class="nav-link" href="pending.html">Service History</a>
        <a class="nav-link" href="messages.html">Messages</a>
        <details class="nav-group" open>
          <summary class="nav-link active">Accounts <span class="nav-caret">&#9662;</span></summary>
          <div class="nav-submenu">
            <a class="nav-sub-link" href="account.html">Profile</a>
            <a class="nav-sub-link active" href="address-book.html">Address Book</a>
            <a class="nav-sub-link" href="security.html">Passwords</a>
          </div>
        </details>
        <a class="nav-link" href="about.html">About Page</a>
        <a class="nav-link nav-logout" href="../../login.html" data-logout="true">Log out</a>
      </aside>

      <main class="content">
        <section class="home-card address-card">
          <h1>ADD ADDRESS</h1>

          <div id="addressFormWrap">
            <form class="address-form" id="addressForm">
              <label class="field-label" for="houseUnit">House No. / Unit No.</label>
              <input class="field" id="houseUnit" type="text" placeholder="123, Unit 2A">
              <div class="field-error" id="error-houseUnit"></div>

              <label class="field-label" for="streetName">Street Name</label>
              <input class="field" id="streetName" type="text" placeholder="Arellano Street">
              <div class="field-error" id="error-streetName"></div>

              <label class="field-label" for="barangay">Barangay</label>
              <select class="field" id="barangay">
                <option value="">Select Barangay</option>
                <option>Bacayao Norte</option>
                <option>Bacayao Sur</option>
                <option>Barangay I (Poblacion)</option>
                <option>Barangay II (Poblacion)</option>
                <option>Barangay III (Poblacion)</option>
                <option>Barangay IV (Poblacion)</option>
                <option>Barangay V (Poblacion)</option>
                <option>Barangay VI (Poblacion)</option>
                <option>Barangay VII</option>
                <option>Barangay VIII</option>
                <option>Bonuan Boquig</option>
                <option>Bonuan Binloc</option>
                <option>Bonuan Gueset</option>
                <option>Calmay</option>
                <option>Carael</option>
                <option>Herrero-Perez</option>
                <option>Lasip Chico</option>
                <option>Lasip Grande</option>
                <option>Lomboy</option>
                <option>Lucao</option>
                <option>Malued</option>
                <option>Mamalingling</option>
                <option>Mangin</option>
                <option>Mayombo</option>
                <option>Pantal</option>
                <option>Pogo Chico</option>
                <option>Pogo Grande</option>
                <option>Salapingao</option>
                <option>Tambac</option>
                <option>Tapuac</option>
                <option>Tebeng</option>
                <option>Tocok</option>
              </select>
              <div class="field-error" id="error-barangay"></div>

              <label class="field-label" for="additionalDetails">Additional Details (Landmark / Notes)</label>
              <textarea class="field" id="additionalDetails" rows="5" maxlength="300" placeholder="e.g. Blue gate beside sari-sari store, near chapel"></textarea>

              <div class="actions-row">
                <button class="save-btn" id="saveAddressBtn" type="submit">SAVE ADDRESS</button>
                <button class="save-btn save-btn-secondary" id="cancelAddressBtn" type="button">CANCEL</button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>

    <div class="address-notice-modal" id="addressNoticeModal" hidden aria-hidden="true">
      <div class="address-notice-card" role="dialog" aria-modal="true" aria-labelledby="addressNoticeTitle">
        <h2 id="addressNoticeTitle">Success</h2>
        <p id="addressNoticeMessage">Done.</p>
        <div class="address-notice-actions">
          <button type="button" class="modal-btn" id="addressNoticeOkBtn">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="../../firebase/config/firebase-config.js"></script>
  <script src="../../databasehfs/users/core.js?v=20260304a"></script>
  <script src="../../databasehfs/users/user-profile-database.js"></script>
  <script src="../../databasehfs/users/booking-database.js"></script>
  <script src="../../databasehfs/users/user-database.js"></script>
  <script src="../../Js/user/side-panel/core.js?v=20260309b"></script>
  <script src="../../Js/user/side-panel/auth.js?v=20260309c"></script>
  <script src="../../Js/user/side-panel/buttons/home.js"></script>
  <script src="../../Js/user/side-panel/buttons/request.js"></script>
  <script src="../../Js/user/side-panel/buttons/history.js"></script>
  <script src="../../Js/user/side-panel/buttons/profile.js"></script>
  <script src="../../Js/user/side-panel/buttons/address-book.js"></script>
  <script src="../../Js/user/side-panel/buttons/security.js"></script>
  <script src="../../Js/user/side-panel/buttons/about.js"></script>
  <script src="../../Js/user/side-panel/buttons/logout.js"></script>
  <script src="../../Js/user/dashboard/parts/core.js"></script>
  <script src="../../Js/user/dashboard/main.js"></script>
  <script src="../../Js/user/address-book/helpers.js"></script>
  <script src="../../Js/user/address-book/parts/add-core.js"></script>
</body>
</html>
