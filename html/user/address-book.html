<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Toggle sidebar" aria-expanded="true">˜°</button>
        <div class="logo-wrapper" aria-hidden="true">
          <img class="top-logo" src="../../images/logos/homefixlogo.png" alt="HomeFixSolution logo">
        </div>
        <div class="app-title">HomeFixSolution</div>
      </div>
      <div class="user-menu-wrap">
        <button class="user-menu-btn" id="userMenuBtn" type="button" aria-haspopup="true" aria-expanded="false">
          User <span class="caret">–¼</span>
        </button>
        <div class="user-menu" id="userMenu" role="menu" aria-hidden="true">
          <a href="../../login.html" role="menuitem" data-logout="true">Log out</a>
        </div>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <a class="nav-link" href="dashboard.html">Home</a>
        <a class="nav-link" href="book.html">Book a Service</a>
        <a class="nav-link" href="pending.html">Service History</a>
        <a class="nav-link" href="messages.html">Messages</a>
        <details class="nav-group" open>
          <summary class="nav-link active">Accounts <span class="nav-caret">&#9662;</span></summary>
          <div class="nav-submenu">
            <a class="nav-sub-link" href="account.html">Profile</a>
            <a class="nav-sub-link active" href="address-book.html">Address Book</a>
            <a class="nav-sub-link" href="security.html">Passwords</a>
          </div>
        </details>
        <a class="nav-link" href="about.html">About Page</a>
        <a class="nav-link nav-logout" href="../../login.html" data-logout="true">Log out</a>
      </aside>

      <main class="content">
        <section class="home-card address-card">
          <h1>ADDRESS BOOK</h1>

          <div class="address-list" id="addressList"></div>

          <div class="actions-row add-new-row">
            <button class="save-btn" id="addNewAddressBtn" type="button">ADD NEW ADDRESS</button>
          </div>
        </section>
      </main>
    </div>

    <div class="delete-address-modal" id="deleteAddressModal" hidden aria-hidden="true">
      <div class="delete-address-modal-card" role="dialog" aria-modal="true" aria-labelledby="deleteAddressTitle">
        <h2 id="deleteAddressTitle">Delete address?</h2>
        <p>This action cannot be undone.</p>
        <div class="delete-address-modal-actions">
          <button type="button" class="modal-btn modal-btn-secondary" id="deleteAddressNoBtn">No</button>
          <button type="button" class="modal-btn" id="deleteAddressYesBtn">Yes</button>
        </div>
      </div>
    </div>

    <div class="address-notice-modal" id="addressNoticeModal" hidden aria-hidden="true">
      <div class="address-notice-card" role="dialog" aria-modal="true" aria-labelledby="addressNoticeTitle">
        <h2 id="addressNoticeTitle">Success</h2>
        <p id="addressNoticeMessage">Done.</p>
        <div class="address-notice-actions">
          <button type="button" class="modal-btn" id="addressNoticeOkBtn">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
