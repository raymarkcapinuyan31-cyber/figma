<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forgot Password - HomeFixSolution</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://firebasedatabase.googleapis.com" crossorigin>
  <link rel="stylesheet" href="../css/user/pages/login/index.css">
</head>
<body data-reset-path="/html/user/reset-password.html">
  <div class="container">
    <div class="card">
      <section class="left" aria-label="HomeFixSolution overview">
        <div class="logo-wrapper">
          <img src="../images/logos/homefixlogo.png" alt="HomeFixSolution logo">
        </div>
        <h1 class="hero-title">HomeFixSolution</h1>
        <p class="tagline">Fast booking. Trusted technicians.</p>
      </section>
      <section class="right" aria-label="Forgot password form">
        <div class="auth-shell">
          <h2 class="title">Forgot Password</h2>
          <p class="auth-subtext">Reset your password by sending a link to your registered email.</p>
          <div class="auth-notice" id="forgotMessage" role="status" aria-live="polite" hidden></div>

          <form id="forgotPasswordForm" class="login-form" novalidate>
            <div class="input-wrapper">
              <label class="input-label" for="forgotEmail">Email</label>
              <div class="field">
                <span class="field-icon" aria-hidden="true">@</span>
                <input id="forgotEmail" class="input" type="email" placeholder="example@example.com" autocomplete="email" aria-label="email">
              </div>
            </div>

            <div class="auth-actions">
              <button class="btn" type="submit">Send Reset Link</button>
              <a class="btn-secondary" href="../login.html">Back to Log In</a>
            </div>
          </form>
        </div>
      </section>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="../firebase/config/firebase-config.js"></script>
  <script src="../databasehfs/users/core.js?v=20260304a"></script>
  <script src="../databasehfs/users/user-profile-database.js"></script>
  <script src="../databasehfs/users/booking-database.js"></script>
  <script src="../databasehfs/users/user-database.js"></script>
  <script src="../Js/user/security/forgot-password.js"></script>
</body>
</html>
